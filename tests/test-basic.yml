name: Test basic usage (latest version)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
      - name: Assert duckdb is installed and executable
        run: |
          echo "Checking duckdb is in PATH..."
          if ! command -v duckdb &>/dev/null; then
            echo "FAIL: duckdb not found in PATH"
            exit 1
          fi
          echo "PASS: duckdb found at $(command -v duckdb)"
      - name: Assert duckdb runs and returns a version
        run: |
          echo "Running duckdb --version..."
          VERSION_OUTPUT=$(duckdb --version 2>&1)
          echo "actual: $VERSION_OUTPUT"
          if [ -z "$VERSION_OUTPUT" ]; then
            echo "FAIL: duckdb --version returned empty output"
            exit 1
          fi
          echo "PASS: duckdb version output: $VERSION_OUTPUT"
      - name: Assert duckdb can execute a simple query
        run: |
          echo "Running a simple SQL query..."
          RESULT=$(duckdb -c "SELECT 42 AS answer;" 2>&1)
          echo "actual: $RESULT"
          if ! echo "$RESULT" | grep -q "42"; then
            echo "FAIL: expected query result to contain '42'"
            exit 1
          fi
          echo "PASS: query executed successfully"
