name: Test basic usage (latest version)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-duckdb
        uses: .
        with:
          version: 'latest'
      - name: Assert duckdb is installed and executable
        run: |
          echo "Checking duckdb is in PATH..."
          if ! command -v duckdb &>/dev/null; then
            echo "FAIL: duckdb command not found in PATH"
            exit 1
          fi
          echo "PASS: duckdb found at $(command -v duckdb)"
      - name: Assert duckdb runs and returns version
        run: |
          echo "Running duckdb --version..."
          VERSION_OUTPUT=$(duckdb --version 2>&1)
          echo "Output: $VERSION_OUTPUT"
          if [ -z "$VERSION_OUTPUT" ]; then
            echo "FAIL: duckdb --version returned empty output"
            exit 1
          fi
          echo "PASS: duckdb version output: $VERSION_OUTPUT"
