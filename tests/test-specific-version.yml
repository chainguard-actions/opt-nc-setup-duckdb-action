name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: 'v1.1.0'
      - name: Assert duckdb is installed and executable
        run: |
          echo "Checking duckdb is in PATH..."
          if ! command -v duckdb &>/dev/null; then
            echo "FAIL: duckdb command not found in PATH"
            exit 1
          fi
          echo "PASS: duckdb found at $(command -v duckdb)"
      - name: Assert duckdb version matches requested version
        run: |
          echo "Running duckdb --version..."
          VERSION_OUTPUT=$(duckdb --version 2>&1)
          echo "Output: $VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -q "v1.1.0"; then
            echo "PASS: duckdb version matches v1.1.0"
          else
            echo "FAIL: expected version v1.1.0 but got: $VERSION_OUTPUT"
            exit 1
          fi
      - name: Assert duckdb can execute a query
        run: |
          echo "Running a simple DuckDB query..."
          RESULT=$(duckdb -c "SELECT 42 AS answer;" 2>&1)
          echo "Query result: $RESULT"
          if echo "$RESULT" | grep -q "42"; then
            echo "PASS: duckdb executed query successfully"
          else
            echo "FAIL: duckdb query did not return expected result"
            exit 1
          fi
